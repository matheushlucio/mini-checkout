<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Mini Checkout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      :root {
        --primary: #2563eb;
        --primary-dark: #1e40af;
        --danger: #dc2626;
        --gray: #6b7280;
        --bg: #f9fafb;
        --card: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        margin: 0;
        background: var(--bg);
        color: #111827;
      }

      header {
        background: var(--primary);
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 20px;
        font-weight: 600;
      }

      main {
        max-width: 1100px;
        margin: 30px auto;
        padding: 0 20px;
        display: grid;
        gap: 20px;
      }

      .card {
        background: var(--card);
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }

      .card h2 {
        margin-top: 0;
        margin-bottom: 20px;
        font-size: 18px;
        border-bottom: 1px solid #e5e7eb;
        padding-bottom: 8px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        font-size: 14px;
        margin-bottom: 5px;
        color: var(--gray);
      }

      input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        font-size: 14px;
        transition: 0.2s;
      }

      input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
      }

      button {
        padding: 10px 16px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: 0.2s;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-primary:hover {
        background: var(--primary-dark);
      }

      .btn-secondary {
        background: #e5e7eb;
      }

      .btn-danger {
        background: var(--danger);
        color: white;
      }

      .btn-danger:hover {
        opacity: 0.9;
      }

      pre {
        background: #111827;
        color: #10b981;
        padding: 15px;
        border-radius: 8px;
        font-size: 13px;
        overflow-x: auto;
        margin-top: 15px;
      }

      @media (min-width: 900px) {
        main {
          grid-template-columns: 1fr 1fr;
        }

        .full {
          grid-column: span 2;
        }
      }
    </style>
  </head>

  <body>
    <header>🛒 Mini Checkout</header>

    <main>
      <!-- PRODUTOS -->
      <div class="card">
        <h2>Produtos</h2>

        <div class="form-group">
          <label>Nome do produto</label>
          <input id="nomeProduto" />
        </div>

        <div class="form-group">
          <label>Preço</label>
          <input id="precoProduto" type="number" step="0.01" />
        </div>

        <div class="actions">
          <button class="btn-primary" onclick="criarProduto()">
            Criar
          </button>
          <button class="btn-secondary" onclick="listarProdutos()">
            Listar
          </button>
        </div>

        <div class="form-group">
          <br>
          <label>ID para deletar</label>
          <input id="deleteProdutoId" type="number" />
        </div>

        <button class="btn-danger" onclick="deletarProduto()">
          Deletar
        </button>

        <pre id="produtos"></pre>
      </div>

      <!-- PEDIDOS -->
      <div class="card">
        <h2>Pedidos</h2>

        <div class="actions">
          <button class="btn-primary" onclick="criarPedido()">
            Criar Pedido
          </button>
          <button class="btn-secondary" onclick="listarPedidos()">
            Listar
          </button>
        </div>

        <div class="form-group">
          <br>
          <label>ID para deletar</label>
          <input id="deletePedidoId" type="number" />
        </div>

        <button class="btn-danger" onclick="deletarPedido()">
          Deletar
        </button>

        <pre id="pedidos"></pre>
      </div>

      <!-- ITENS -->
      <div class="card full">
        <h2>Itens do Pedido</h2>

        <div class="form-group">
          <label>ID do pedido</label>
          <input id="pedidoId" type="number" />
        </div>

        <div class="form-group">
          <label>ID do produto</label>
          <input id="produtoId" type="number" />
        </div>

        <div class="form-group">
          <label>Quantidade</label>
          <input id="quantidade" type="number" min="1" />
        </div>

        <div class="actions">
          <button class="btn-primary" onclick="adicionarItem()">
            Adicionar Item
          </button>
          <button class="btn-secondary" onclick="finalizarPedido()">
            Finalizar Pedido
          </button>
        </div>
      </div>
    </main>

  <script>
    const API = 'http://localhost:3000';

    function limparCampo(id) {
      document.getElementById(id).value = '';
    }

    async function criarProduto() {
      const nome = nomeProduto.value;
      const preco = Number(precoProduto.value);

      if (!nome || !preco) return alert('Preencha todos os campos.');

      await fetch(`${API}/produtos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, preco })
      });

      limparCampo('nomeProduto');
      limparCampo('precoProduto');

      listarProdutos();
      alert('Produto criado com sucesso');
    }

    async function listarProdutos() {
      const res = await fetch(`${API}/produtos`);
      const data = await res.json();
      produtos.textContent = JSON.stringify(data, null, 2);
    }

    async function deletarProduto() {
      const id = deleteProdutoId.value;
      if (!id) return alert('Informe o ID.');

      await fetch(`${API}/produtos/${id}`, { method: 'DELETE' });

      limparCampo('deleteProdutoId');
      listarProdutos();
      alert('Produto deletado');
    }

    async function criarPedido() {
      const produtoId = Number(document.getElementById('produtoId').value);
      const quantidade = Number(document.getElementById('quantidade').value);

      if (!produtoId || !quantidade) {
        alert('Informe produto e quantidade para criar o pedido.');
        return;
      }

      const res = await fetch(`${API}/pedidos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          itens: [{ produtoId, quantidade }]
        })
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.erro);
        return;
      }

      alert(`Pedido criado com ID ${data.id}`);
      listarPedidos();
    }


    async function listarPedidos() {
      const res = await fetch(`${API}/pedidos`);
      const data = await res.json();
      pedidos.textContent = JSON.stringify(data, null, 2);
    }

    async function deletarPedido() {
      const id = deletePedidoId.value;
      if (!id) return alert('Informe o ID.');

      await fetch(`${API}/pedidos/${id}`, { method: 'DELETE' });

      limparCampo('deletePedidoId');
      listarPedidos();
      alert('Pedido deletado');
    }

    async function adicionarItem() {
  const pedidoId = Number(document.getElementById('pedidoId').value);
  const produtoId = Number(document.getElementById('produtoId').value);
  const quantidade = Number(document.getElementById('quantidade').value);

  if (!pedidoId || !produtoId || !quantidade) {
    alert('Preencha todos os campos corretamente.');
    return;
  }

  const res = await fetch(`${API}/pedidos/${pedidoId}/itens`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ produtoId, quantidade })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.erro);
    return;
  }

  alert('Item adicionado com sucesso');
  listarPedidos();
}



    async function finalizarPedido() {
      const pedidoId = Number(document.getElementById('pedidoId').value);

      if (!pedidoId) {
        alert('Informe o ID do pedido.');
        return;
      }

      await fetch(`${API}/pedidos/${pedidoId}/finalizar`, {
        method: 'POST'
      });

      listarPedidos();
      alert('Pedido finalizado');
    }

  </script>
</body>

</html>
