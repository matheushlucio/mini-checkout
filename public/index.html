<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8"/>
<title>Mini Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>

:root{
--primary:#2563eb;
--primary-dark:#1e40af;
--danger:#dc2626;
--gray:#6b7280;
--bg:#f9fafb;
--card:#ffffff;
}

body{
font-family:system-ui;
margin:0;
background:var(--bg);
}

header{
background:var(--primary);
color:white;
padding:20px;
text-align:center;
font-size:20px;
font-weight:600;
}

main{
max-width:1100px;
margin:30px auto;
padding:0 20px;
display:grid;
gap:20px;
}

.card{
background:var(--card);
padding:25px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

h2{
margin-top:0;
}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #d1d5db;
margin-bottom:10px;
}

button{
padding:10px 16px;
border-radius:8px;
border:none;
cursor:pointer;
}

.btn-primary{
background:var(--primary);
color:white;
}

.btn-danger{
background:var(--danger);
color:white;
}

.prod-grid{
display:flex;
flex-wrap:wrap;
gap:12px;
}

.prod-card{
width:220px;
padding:12px;
border-radius:8px;
background:var(--card);
box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

.pedido-card{
background:#f3f4f6;
padding:15px;
border-radius:8px;
margin-top:15px;
}

</style>
</head>

<body>

<header>🛒 Mini Checkout</header>

<main>

<!-- CLIENTES -->
<div class="card">

<h2>Clientes</h2>

<input id="nomeCliente" placeholder="Nome do cliente"/>
<input id="emailCliente" placeholder="Email"/>

<button class="btn-primary" onclick="criarCliente()">Cadastrar Cliente</button>

<br><br>

<select id="clienteSelect"></select>

<div id="clientesContainer"></div>

</div>


<!-- PRODUTOS -->
<div class="card">

<h2>Produtos</h2>

<input id="nomeProduto" placeholder="Nome produto"/>
<input id="precoProduto" type="number" placeholder="Preço"/>

<button class="btn-primary" onclick="criarProduto()">Criar Produto</button>
<button onclick="carregarCatalogo()">Atualizar</button>

<div id="produtosContainer"></div>

</div>


<!-- CARRINHO -->
<div class="card">

<h2>Carrinho</h2>

<div id="cartContainer"></div>

<button id="btnFinalizar" class="btn-primary" onclick="finalizarCarrinho()">
Finalizar Pedido
</button>

<button onclick="limparCarrinho()">
Limpar
</button>

</div>


<!-- PEDIDOS -->
<div class="card">

<h2>Pedidos</h2>

<div id="pedidosContainer"></div>

</div>

</main>

<script>

const API="http://localhost:3000"

let produtosCatalogo=[]
let cart=JSON.parse(localStorage.getItem("cart"))||[]

function salvarCart(){
localStorage.setItem("cart",JSON.stringify(cart))
}

function limparCarrinho(){
cart=[]
salvarCart()
renderCart()
}

async function criarCliente(){

const nome=nomeCliente.value
const email=emailCliente.value

if(!nome||!email){
alert("Preencha nome e email")
return
}

await fetch(`${API}/clientes`,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({nome,email})
})

nomeCliente.value=""
emailCliente.value=""

listarClientes()

}

async function listarClientes(){

const res=await fetch(`${API}/clientes`)
const clientes=await res.json()

clienteSelect.innerHTML=""
clientesContainer.innerHTML=""

clientes.forEach(c=>{

clienteSelect.innerHTML+=`
<option value="${c.id}">
${c.nome} - ${c.email}
</option>
`

clientesContainer.innerHTML+=`
<p>${c.nome} - ${c.email}</p>
`

})

}

async function criarProduto(){

const nome=nomeProduto.value
const preco=Number(precoProduto.value)

await fetch(`${API}/produtos`,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({nome,preco})
})

nomeProduto.value=""
precoProduto.value=""

carregarCatalogo()

}

async function carregarCatalogo(){

const res=await fetch(`${API}/produtos`)
produtosCatalogo=await res.json()

renderProdutos()

}

function renderProdutos(){

const container=document.getElementById("produtosContainer")

container.innerHTML=`
<div class="prod-grid">

${produtosCatalogo.map(p=>`

<div class="prod-card">

<h4>${p.nome}</h4>

<p>R$ ${p.preco}</p>

<button class="btn-primary" onclick="addToCart(${p.id})">
Adicionar (${cart.find(i=>i.produtoId===p.id)?.quantidade||0})
</button>

</div>

`).join("")}

</div>
`

}

function addToCart(id){

const produto=produtosCatalogo.find(p=>p.id===id)

const existing=cart.find(i=>i.produtoId===id)

if(existing){
existing.quantidade++
}else{
cart.push({
produtoId:produto.id,
nome:produto.nome,
preco:produto.preco,
quantidade:1
})
}

salvarCart()

renderCart()
renderProdutos()

}

function renderCart(){

const container=document.getElementById("cartContainer")

if(cart.length===0){
container.innerHTML="Carrinho vazio"
return
}

container.innerHTML=cart.map(i=>`
<p>
${i.nome} x${i.quantidade}
<button onclick="removeFromCart(${i.produtoId})">remover</button>
</p>
`).join("")

}

function removeFromCart(id){
cart=cart.filter(i=>i.produtoId!==id)
salvarCart()
renderCart()
renderProdutos()
}

async function finalizarCarrinho(){

const clienteId=clienteSelect.value

if(!clienteId){
alert("Selecione um cliente")
return
}

const btn=document.getElementById("btnFinalizar")
btn.disabled=true
btn.innerText="Processando..."

const resPedido=await fetch(`${API}/pedidos`,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({clienteId})
})

const pedido=await resPedido.json()

for(const item of cart){

await fetch(`${API}/pedidos/${pedido.id}/itens`,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
produtoId:item.produtoId,
quantidade:item.quantidade
})
})

}

await fetch(`${API}/pedidos/${pedido.id}/finalizar`,{
method:"POST"
})

alert("Pedido criado!")

limparCarrinho()

listarPedidos()

btn.disabled=false
btn.innerText="Finalizar Pedido"

}

async function listarPedidos(){

const res=await fetch(`${API}/pedidos`)
const pedidos=await res.json()

const container=document.getElementById("pedidosContainer")

container.innerHTML=""

pedidos.forEach(p=>{

container.innerHTML+=`
<div class="pedido-card">

<h3>Pedido #${p.id}</h3>

<p>Status: ${p.status}</p>

</div>
`

})

}

window.onload=()=>{
listarClientes()
carregarCatalogo()
listarPedidos()
renderCart()
}

</script>

</body>
</html>
